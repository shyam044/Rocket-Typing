    function startGameWithName(name) {

    ];
    const restartBtn = document.getElementById('restart-btn');

    function assignAINames() {

      const shuffled = [...aiNames].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 4);

      const nameEls = document.querySelectorAll('#race-track .lane .name');

      nameEls[0].textContent = selected[0];
      nameEls[1].textContent = selected[1];
      nameEls[2].textContent = selected[2];
      nameEls[3].textContent = selected[3];
    }
    let caret = null;

    // ==================== VOCABULARY & GENERATION ====================
    const vocabulary = {
      nouns: ["ability", "absence", "academy", "account", "achievement", "acid", "action", "actor", "actress", "addition"],
      verbs: ["accept", "achieve", "acknowledge", "adapt", "add", "adjust", "admire", "admit", "adopt", "advise"],
      adjectives: ["able", "abundant", "acceptable", "accurate", "active", "adaptable", "adorable", "adventurous", "afraid", "aggressive"],
      adverbs: ["abruptly", "accidentally", "accordingly", "accurately", "actively", "adversely", "afterward", "almost", "always", "angrily"],
      prepositions: ["about", "above", "across", "after", "against", "along", "amid", "among", "around", "as"],
      articles: ["a", "an", "the", "this", "that", "these", "those", "my", "your", "his", "her", "its", "our", "their"],
      months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"],
      days: Array.from({ length: 31 }, (_, i) => String(i + 1)),
      years: Array.from({ length: 124 }, (_, i) => String(1900 + i))
    };

    const templates = {
      easy: ["{article} {adjective} {noun} {verb} {adverb}", "{article} {noun} {verb} {preposition} {article} {adjective} {noun}"]
    };

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function generateSentence() {
      let template = randomItem(templates.easy);
      let sentence = template
        .replace(/{article}/g, () => randomItem(vocabulary.articles))
        .replace(/{adjective}/g, () => randomItem(vocabulary.adjectives))
        .replace(/{noun}/g, () => randomItem(vocabulary.nouns))
        .replace(/{verb}/g, () => randomItem(vocabulary.verbs))
        .replace(/{adverb}/g, () => randomItem(vocabulary.adverbs))
        .replace(/{preposition}/g, () => randomItem(vocabulary.prepositions));
      return sentence.toLowerCase();
    }

    function generateWords() {
      words = [];
      let fullText = "";
      while (words.length < 220) {
        fullText += generateSentence() + " ";
        words = fullText.trim().split(" ");
      }
      words = words.slice(0, 220);
    }

    function renderInitialWords() {
      wordsDiv.innerHTML = '';
      words.forEach((word, i) => {
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word';
        if (i === 0) wordSpan.classList.add('active');
        word.split('').forEach(letter => {
          const span = document.createElement('span');
          span.className = 'letter';
          span.textContent = letter;
          wordSpan.appendChild(span);
        });
        wordsDiv.appendChild(wordSpan);
      });
      createCaret();
      refreshCaretAndScroll();
    }

    function createCaret() {
      if (caret) return;
      caret = document.createElement('div');
      caret.id = 'caret';
      wordsDiv.appendChild(caret);
    }

    function appendNewWords(count) {
      for (let i = 0; i < count; i++) {
        const sentence = generateSentence() + " ";
        const newWords = sentence.trim().split(" ");
        newWords.forEach(word => {
          if (!word) return;
          const wordSpan = document.createElement('span');
          wordSpan.className = 'word';
          word.split('').forEach(letter => {
            const span = document.createElement('span');
            span.className = 'letter';
            span.textContent = letter;
            wordSpan.appendChild(span);
          });
          wordsDiv.appendChild(wordSpan);
          words.push(word);
        });
      }
      if (caret) wordsDiv.appendChild(caret);
    }

    // ==================== MONKEYTYPE-STYLE CARET USING BOUNDING CLIENT RECT (FINAL FIX) ====================
    function getCaretPosition() {
      const activeWordEl = wordsDiv.querySelector('.word.active');
      if (!activeWordEl) return { x: 0, y: 20 };

      const letters = activeWordEl.querySelectorAll('.letter');
      let targetEl;

      if (currentLetterIndex < letters.length) {
        targetEl = letters[currentLetterIndex];
      } else if (letters.length > 0) {
        targetEl = letters[letters.length - 1];
      } else {
        targetEl = activeWordEl;
      }

      const rect = targetEl.getBoundingClientRect();
      const containerRect = wordsDiv.getBoundingClientRect();

      let x = rect.left - containerRect.left;
      if (currentLetterIndex >= letters.length && letters.length > 0) {
        x += rect.width;
      }
      const y = rect.top - containerRect.top + 10;

      return { x, y };
    }

    function refreshCaretAndScroll() {
      requestAnimationFrame(() => {
        void wordsDiv.offsetHeight;
        const pos = getCaretPosition();

        caret.style.left = `${pos.x}px`;
        caret.style.top = `${pos.y}px`;

        const caretX = pos.x;
        const desiredOffset = SCROLL_CENTER - caretX;
        wordsOffset = Math.min(0, desiredOffset);
        wordsDiv.style.transform = `translateX(${wordsOffset}px)`;
      });
    }

      if (resultDiv.classList.contains('visible')) {
        return;
      }

      if (!testActive && e.key !== 'Tab') {
        testActive = true;
        startTime = Date.now();
        elapsedInterval = setInterval(updateElapsed, 1000);
        opponentInterval = setInterval(updateOpponentProgress, 50)
        caret.style.opacity = '1';
      }
      if (!testActive) return;

      const key = e.key;

      if (key === 'Backspace') {
        handleBackspace();
        return;
      }

      if (key.length === 1 || key === ' ') {
        keystrokeTimestamps.push(Date.now());
      }

      if (key === ' ') {
        spaces++;
        const wordLen = words[currentWordIndex].length;
        const isCorrectSpace = (currentLetterIndex === wordLen);

        if (isCorrectSpace) {
          correctSpaces++;
          playerProgress += PROGRESS_PER_CHAR;
          correctChars++;
          playerRocket.parentElement.classList.add('boost');
          setTimeout(() => playerRocket.parentElement.classList.remove('boost'), 280);
          updatePlayerPosition();
        } else {
          missedChars += wordLen - currentLetterIndex;
          const activeWordEl = wordsDiv.querySelector('.word.active');
          const letterSpans = activeWordEl.querySelectorAll('.letter');
          for (let i = currentLetterIndex; i < letterSpans.length; i++) {
            letterSpans[i].classList.add('incorrect');
          }
        }
        moveToNextWord();
        e.preventDefault();
        return;
      }

      if (key.length === 1) {
        typeLetter(key);
        e.preventDefault();
      }
    }
    function typeLetter(key) {
      const word = words[currentWordIndex];
      let wordObj = typedWords[currentWordIndex];
      if (!wordObj) {
        typedWords[currentWordIndex] = { letters: [], correct: [], extra: [] };
        wordObj = typedWords[currentWordIndex];
      }

      rawChars++;

      if (currentLetterIndex < word.length) {
        wordObj.letters[currentLetterIndex] = key;
        const isCorrect = key === word[currentLetterIndex];
        wordObj.correct[currentLetterIndex] = isCorrect;

        if (isCorrect) {
          correctChars++;
          playerProgress += PROGRESS_PER_CHAR;
          updatePlayerPosition();
        }

        // DOM update (unchanged)
        const activeWordEl = wordsDiv.querySelector('.word.active');
        const letterSpans = activeWordEl.querySelectorAll('.letter');
        letterSpans[currentLetterIndex].classList.toggle('correct', isCorrect);
        letterSpans[currentLetterIndex].classList.toggle('incorrect', !isCorrect);

        currentLetterIndex++;
      } else {
        // extra characters
        wordObj.extra.push(key);
        currentLetterIndex++;
      }

      refreshCaretAndScroll();
    }
    function handleBackspace() {
      if (currentLetterIndex <= 0) return;

      const wordObj = typedWords[currentWordIndex];
      const activeWordEl = wordsDiv.querySelector('.word.active');
      const letterSpans = activeWordEl.querySelectorAll('.letter');
      const lastIndex = currentLetterIndex - 1;

      // stats
      rawChars = Math.max(0, rawChars - 1);
      if (wordObj && lastIndex >= wordObj.letters.length) {
        wordObj.extra.pop();
      } else if (wordObj && wordObj.correct[lastIndex] === true) {
        correctChars = Math.max(0, correctChars - 1);
      }

      if (letterSpans[lastIndex]) {
        letterSpans[lastIndex].classList.remove('correct', 'incorrect');
      }

      if (wordObj) {
        wordObj.letters[lastIndex] = undefined;
        wordObj.correct[lastIndex] = undefined;
      }

      currentLetterIndex--;
      refreshCaretAndScroll();
    }

    function moveToNextWord() {
      const oldWord = wordsDiv.querySelector('.word.active');
      if (oldWord) oldWord.classList.remove('active');

      currentWordIndex++;
      currentLetterIndex = 0;

      if (currentWordIndex > words.length - 40 && playerProgress < TRACK_WIDTH) {
        appendNewWords(80);
      }

      const allWords = wordsDiv.querySelectorAll('.word');
      const newActive = allWords[currentWordIndex];
      if (newActive) newActive.classList.add('active');

      refreshCaretAndScroll();
    }
    function updatePlayerPosition() {
      worldOffset = Math.max(0, playerProgress - CENTER);

      const screenX = Math.min(playerProgress, CENTER);
      playerRocket.style.left = `${screenX}px`;

      document.getElementById("race-track").style.backgroundPosition = `-${worldOffset}px 0px`;
      document.getElementById("space-bg").style.transform = `translateX(-${worldOffset}px)`;

      updateAllVisuals();   // ← crucial

      if (playerProgress >= TRACK_WIDTH) {
        endRace(true);
      }
    }
    function updateAllVisuals() {
      // Opponents – now camera-relative
      for (let i = 0; i < oppRockets.length; i++) {
        const screenX = opponentProgress[i] - worldOffset;
        oppRockets[i].style.left = `${screenX}px`;
      }
      // Finish line & text – now scrolls in from the right exactly like real races
      const finishX = TRACK_WIDTH - worldOffset;
      document.getElementById('finish-line').style.left = `${finishX}px`;
      document.getElementById('finish-text').style.left = `${finishX + 14}px`;
    }
    function updateOpponentProgress() {
      if (!testActive) return;
      let opponentWon = false;
      for (let i = 0; i < oppRockets.length; i++) {
        opponentProgress[i] += opponentSpeeds[i] * 0.05; // ← delta time fix (50ms)
        if (opponentProgress[i] >= TRACK_WIDTH) {
          opponentWon = true;
        }
      }
      if (opponentWon) {
        endRace(false);
        return;
      }
      updateAllVisuals();
    }
    function updateElapsed() {
      if (!startTime) return;
      const secs = Math.floor((Date.now() - startTime) / 1000);
      timerDiv.textContent = `${Math.floor(secs / 60)}:${(secs % 60).toString().padStart(2, '0')}`;
    }
    function calculateStats() {
      const elapsedMinutes = (Date.now() - startTime) / 60000 || 0.001;
      let correctWordChars = 0;
      let allCorrectChars = 0;
      let incorrectChars = 0;
      let extraChars = 0;
      // Completed words (same logic as main test)
      for (let w = 0; w < currentWordIndex; w++) {
        const wordObj = typedWords[w] || { letters: [], correct: [], extra: [] };
        const wordLen = words[w].length;
        const isExactMatch = wordObj.letters.length === wordLen &&
          wordObj.extra.length === 0 &&
          wordObj.correct.every(b => b === true);
        if (isExactMatch) correctWordChars += wordLen;
        allCorrectChars += wordObj.correct.filter(b => b).length;
        incorrectChars += wordObj.correct.filter(b => !b).length;
        extraChars += wordObj.extra.length;
      }
      // Partial last word (only counts if perfect so far – same as main test)
      if (typedWords[currentWordIndex]) {
        const last = typedWords[currentWordIndex];
        const hasNoIncorrect = !last.correct.some(b => b === false);
        const hasNoExtra = last.extra.length === 0;

        allCorrectChars += last.correct.filter(b => b).length;
        incorrectChars += last.correct.filter(b => !b).length;
        extraChars += last.extra.length;

        if (hasNoIncorrect && hasNoExtra) {
          correctWordChars += currentLetterIndex;
        }
      }
      const wpm = Math.round((correctWordChars + correctSpaces) / 5 / elapsedMinutes);
      const accuracy = (allCorrectChars + incorrectChars > 0)
        ? Math.round((allCorrectChars / (allCorrectChars + incorrectChars)) * 100)
        : 100;
      // consistency stays exactly the same as before
      let consistency = 100;
      if (keystrokeTimestamps.length > 8) {
        const windows = [];
        const windowSize = 1000;
        for (let t = startTime; t < Date.now(); t += windowSize) {
          const count = keystrokeTimestamps.filter(ts => ts >= t && ts < t + windowSize).length;
          windows.push(count);
        }
        const rawWpms = windows.map(c => (c * 60) / 5).filter(w => w > 0);
        if (rawWpms.length > 2) {
          const mean = rawWpms.reduce((a, b) => a + b, 0) / rawWpms.length;
          const variance = rawWpms.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / rawWpms.length;
          const std = Math.sqrt(variance);
          const cov = std / mean;
          consistency = Math.max(0, Math.round(100 - (cov * 80)));
        }
      }
      return {
        wpm: Math.max(0, wpm),
        acc: Math.min(100, accuracy),
        cons: Math.min(100, consistency)
      };
    }
    function endRace(playerWon) {
      testActive = false;
      clearInterval(elapsedInterval);
      clearInterval(opponentInterval);
      const stats = calculateStats();
      // ===== Update stored performance =====
      totalMatches++;
      totalWPM += stats.wpm;
      localStorage.setItem("rt_matches", totalMatches);
      localStorage.setItem("rt_total_wpm", totalWPM);
      document.getElementById('wpm-value').textContent = stats.wpm;
      document.getElementById('acc-value').textContent = stats.acc + '%';
      document.getElementById('cons-value').textContent = stats.cons + '%';
      const titleEl = document.getElementById('race-result-title');
      const subtitleEl = document.getElementById('race-result-subtitle');
      if (playerWon) {
        titleEl.textContent = "🚀 YOU WIN!";
        titleEl.style.color = "#ffd700";
        subtitleEl.textContent = "You launched past all opponents!";
        subtitleEl.style.color = "#e2b714";
      } else {
        titleEl.textContent = "BETTER LUCK NEXT TIME";
        titleEl.style.color = "#ff4c4c";
        subtitleEl.textContent = "One of the AI rockets beat you";
        subtitleEl.style.color = "#aaa";
      }
      resultDiv.classList.add('visible');
    }
    function resetRace() {
      // ===== Dynamic AI difficulty =====
      const avgWPM = getAverageWPM();
      const pxPerSec = (wpm) => wpm * 0.5;   // correct physics: 5 chars × 6 px × WPM / 60
      opponentSpeeds = [
        pxPerSec(avgWPM + 2),                 // Fast bot
        pxPerSec(avgWPM - 5),                 // Slightly slower
        Math.max(5, pxPerSec(avgWPM - 20)),   // Much slower
        pxPerSec(avgWPM - 5)                  // Medium bot
      ];
      clearInterval(elapsedInterval);
      clearInterval(opponentInterval);
      testActive = false;
      typedWords = [];
      missedChars = 0;
      spaces = 0;
      correctSpaces = 0;
      playerProgress = 0;
      opponentProgress = [0, 0, 0, 0];
      currentWordIndex = 0;
      currentLetterIndex = 0;
      correctChars = 0;
      rawChars = 0;
      keystrokeTimestamps = [];
      playerRocket.style.left = '0px';
      oppRockets.forEach(r => r.style.left = '0px');
      oppRockets.forEach(r => r.parentElement.classList.remove('boost'));
      timerDiv.textContent = '0:00';
      resultDiv.classList.remove('visible');
      wordsOffset = 0;
      wordsDiv.style.transform = "translateX(0px)";
      generateWords();
      renderInitialWords();
      assignAINames();
      if (document.querySelectorAll('.star').length === 0) {
        const track = document.getElementById('race-track');
        for (let i = 0; i < 200; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 3 + 1.5;
          star.style.width = size + 'px';
          star.style.height = size + 'px';
          star.style.left = Math.random() * 3000 + 'px';
          star.style.top = Math.random() * 420 + 'px';
          star.style.animationDelay = Math.random() * 3 + 's';
          track.appendChild(star);
        }
      }
      worldOffset = 0;
      updateAllVisuals();   // init finish line off-screen to the right
    }
    restartBtn.addEventListener('click', () => {
      resultDiv.classList.remove('visible');
      resetRace();
    });
    document.body.addEventListener('click', () => { });
    // ===== FINAL LOAD CHECK (moved here so everything is already defined) =====
    if (localStorage.getItem("rt_username")) {
      usernameScreen.style.display = "none";
      startGameWithName(localStorage.getItem("rt_username"));
    }
  </script>
